<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Arquivos Públicos</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="documentos.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background:
                linear-gradient(rgba(6, 6, 6, .95), rgba(6, 6, 6, .95)),
                url("https://images.unsplash.com/photo-1512820790803-83ca734da794");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            font-family: "Cormorant Garamond", serif;

            color: #e9d39b;

            min-height: 100vh;

        }

        header {

            padding: 70px 20px;

            text-align: center;

        }

        header h1 {

            font-family: "Cinzel", serif;

            font-size: 3.5rem;

            letter-spacing: 6px;

            color: #f3c76a;

            margin-bottom: 20px;

        }

        header p {

            font-size: 1.3rem;

            color: #bca77a;

            max-width: 900px;

            margin: auto;

        }

        .container {

            max-width: 1400px;

            margin: auto;

            padding: 40px;

        }

        .grid {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));

            gap: 30px;

        }

        .card {

            background: rgba(35, 28, 20, .95);

            border: 2px solid #5e4720;

            padding: 30px;

            border-radius: 10px;

            transition: .35s;

        }

        .card:hover {

            transform: translateY(-6px);

            border-color: #d4a74f;

            box-shadow: 0 0 25px rgba(212, 167, 79, .25);

        }

        .card h2 {

            font-family: "Cinzel", serif;

            color: #f0cb7d;

            margin-bottom: 15px;

        }

        .card p {

            margin-bottom: 20px;

            font-size: 1.15rem;

        }

        .card span {

            color: #8fdc87;

            font-weight: bold;

        }

        input {

            width: 100%;

            padding: 12px;

            background: #1d1a16;

            border: 1px solid #8f6b2c;

            color: white;

            font-size: 18px;

            margin-bottom: 15px;

            outline: none;

        }

        button {

            width: 100%;

            padding: 12px;

            background: #8f6b2c;

            border: none;

            cursor: pointer;

            font-family: "Cinzel", serif;

            font-size: 16px;

            color: white;

            transition: .3s;

        }

        button:hover {

            background: #d6aa53;

            color: #20150a;

        }
    </style>

</head>

<body>

    <header>

        <h1>ARQUIVOS PÚBLICOS</h1>

        <p>
            Diversos documentos encontram-se catalogados neste arquivo.
            Alguns registros possuem acesso restrito e exigem autorização.
        </p>

    </header>

    <div class="container">

        <div class="grid" id="gridDocumentos"></div>

    </div>

    <script src="documentos.js"></script>

</body>

</html>
